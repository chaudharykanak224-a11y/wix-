<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .colorclass{
      color: #4460bb;
    }
    .slashtext{
      display: flex;
      gap: 5px;
    }
    .slash{
      border: 1px solid;
      font-size: 26px;
    padding: 0px 10px;
    background-color: #c63f60;
    color: white;
    }
    .stxt{
          font-size: 27px;
         display: flex;
    }
    .axcon{

    }
    .axcon>ul{
      list-style-type: none;
      display: flex;
      gap: 30px;
    }
    .mainaxis{
      display: flex;
      align-items: center;
      justify-content: space-around;
    }
    .usertxt{
      display: flex;
    }
    .mainlogindiv{
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="axisgroup">
    <!-- axisgrp start  -->
     <div class="mainaxis">
              <!-- mainaxis start  -->
        <div class="slashtext">
          <!-- slashtxt start  -->
              <div class="slash">
                <div>/</div>
              </div>
              <!-- slash end here  -->
                <!-- text start here  -->
                 <div class="maintxt">
                 <div class="stxt"> 
                   <div><span>Axis</span> </div>
                   <div class="txt"><span class="colorclass">Group</span>
                 </div>
                 </div>
                 </div>
                        <!-- stxt end here  -->
                   <!-- slashtxt end here  -->
        </div>
              <!-- axiscontent start  -->
               <div class="axiscon">
                    <!-- listcon start  -->
                     <div class="licon">
                        <div class="axcon">
                          <ul>
                            <li class="colorclass">Home</li>
                            <li>About</li>
                            <li> Services</li>
                            <li>Plans</li>
                            <li>News & Updates</li>
                            <li>Financial Tools</li>
                            <li>More</li>
                          </ul>
                        </div>
                     </div>
                       <!-- listcon end here  -->

               </div>
                <!-- axiscon end here  -->
                   <!-- login section start -->
                    <div class="mainlogindiv">
                                           <!-- mainlogin div start  -->
                     <div class="Ulogo">
                      <div>
                        <img src="./images/use.png"
                        width="32px"
                        height="32px"
                        alt="">
                      </div>
                     </div>
                     <!-- ulogo end here  -->
                       <!-- usertext here  -->
                        <div class="usertxt">
                          <div class="txt1">
                          <div><span class="colorclass">LOG</span></div>
                        </div>
                        <div class="txt2">
                          <div><span class="colorclass">IN</span></div>
                        </div>
                         </div>
                    <!-- mainlogin div end here                         -->
                    </div>

             <!-- mainaxis end here  -->
     </div>
     <!-- axisgrp end here  -->
  </div>
</body>
</html>
